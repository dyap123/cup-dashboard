<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID = '1fTL_w-kLz0Jzwni9r3kSuGqSvlsFhNm0RsfRurQH750';
const GID      = '999';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit#gid=${GID}`;
const GViz_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

document.getElementById('sheetLink').href       = SHEET_URL;
document.getElementById('footerSheetLink').href = SHEET_URL;

const SEC_COLORS = { A:'#41A447', B:'#FF8C00', C:'#4AB8FF', D:'#8B5CF6' };
const SEC_DIM    = { A:'#162a18', B:'#3a2200', C:'#1a2d4d', D:'#2a1a4d' };

// Editable pour labels (persisted in localStorage)
function getPourLabel(id) { return localStorage.getItem('cup_label_'+id) || ''; }
function setPourLabel(id, val) { localStorage.setItem('cup_label_'+id, val); }

// Ordered status — writes to sheet via Apps Script
const API_URL = 'https://script.google.com/macros/s/AKfycbwNOYItk1zZdQbVktGTND9TIloio1Su4FFIuccoX2hG22FpKug9M-3C3h5zgtkNFmks/exec';
function getOrdered(id) { return localStorage.getItem('cup_ordered_'+id) === 'YES'; }
function toggleOrdered(id) {
  const newVal = !getOrdered(id);
  localStorage.setItem('cup_ordered_'+id, newVal ? 'YES' : 'NO');
  // Write to sheet
  fetch(API_URL, { method:'POST', mode:'no-cors', body:JSON.stringify({ pourId:id, ordered:newVal }) }).catch(()=>{});
  render();
}

// ── PARSER HELPERS ───────────────────────────────────────────────────────────
function anyNum(row, idx) {
  const c = row?.c?.[idx];
  if (!c || c.v == null) return 0;
  if (typeof c.v === 'number') return c.v;
  if (typeof c.v === 'string') { const n = parseFloat(c.v.replace(/,/g,'')); return isNaN(n) ? 0 : n; }
  return 0;
}
function anyStr(row, idx) {
  const c = row?.c?.[idx];
  if (!c || c.v == null) return '';
  return String(c.v);
}
function anyDate(row, idx) {
  const c = row?.c?.[idx];
  if (!c || c.v == null) return null;
  const v = String(c.v);
  if (v.startsWith('Date(')) {
    const p = v.match(/Date\((\d+),(\d+),(\d+)\)/);
    if (p && parseInt(p[1]) > 2000) return `${parseInt(p[2])+1}/${p[3]}`;
  }
  if (c.f) return c.f;
  return null;
}

// ── STATE ────────────────────────────────────────────────────────────────────
let state = { refs:{}, pours:[], grand:{}, sectionFilter:'ALL', dateFilter:'ALL', sortByDate:false };
// ── FETCH & PARSE (formatted sheet with REFERENCE + ORDER SUMMARY sections) ──
async function fetchData() {
  const res  = await fetch(GViz_URL);
  const text = await res.text();
  const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!m) throw new Error('Invalid response from Google Sheets');
  const json = JSON.parse(m[1]);
  const rows = json.table.rows;

  const refs = {}, pours = [];
  let grand = { cy8000:0, cy5000:0, slurry:0, total:0, trucks:0 };
  let mode = 'ref'; // start with reference rows (gviz skips header rows)

  for (const row of rows) {
    if (!row?.c) continue;
    const a = anyStr(row, 0).trim();

    // Reference rows (A/B/C/D at the start)
    if (mode === 'ref' && ['A','B','C','D'].includes(a)) {
      const cy8000 = anyNum(row, 1);
      const slurryVol = anyNum(row, 3);
      const plinthVol = anyNum(row, 5);
      const secTotal = anyNum(row, 6);
      const cy5000 = Math.max(0, secTotal - cy8000 - slurryVol - plinthVol);
      refs[a] = { cy8000, cy5000, slurryVol, plinthVol, secTotal };
      continue;
    }
    if (a === 'TOTAL') { mode = 'scan'; continue; }

    // Find ORDER SUMMARY
    if (a === 'ORDER SUMMARY') { mode = 'order_skip'; continue; }
    if (mode === 'order_skip') { mode = 'order'; continue; } // skip header row

    // Parse order rows
    if (mode === 'order') {
      if (a === 'GRAND TOTAL') {
        grand = {
          cy8000: anyNum(row, 3), cy5000: anyNum(row, 4),
          slurry: anyNum(row, 5), total: anyNum(row, 6), trucks: anyNum(row, 7),
        };
        break;
      }
      if (/^[A-D]-[1-9]/.test(a)) {
        pours.push({
          id: a, section: anyStr(row, 1).trim() || a[0],
          date: anyDate(row, 2),
          cy8000: anyNum(row, 3), cy5000: anyNum(row, 4),
          slurry: anyNum(row, 5), total: anyNum(row, 6),
          trucks: anyNum(row, 7), status: anyStr(row, 8).trim(),
          label: '', type: '',
        });
      }
    }
  }

  // Infer type from data
  for (const p of pours) {
    if (p.slurry > 0 && p.cy8000 === 0 && p.cy5000 === 0) p.type = 'Slurry';
    else if (p.total <= 5 && p.cy8000 > 0 && p.cy5000 === 0 && p.slurry === 0) p.type = 'Plinth';
    else p.type = 'Structural';
  }

  return { refs, pours, grand };
}

function openSheet() { window.open(SHEET_URL, '_blank'); }

// ── FILTER LOGIC ─────────────────────────────────────────────────────────────
function filteredPours() {
  let pours = state.pours.filter(p => {
    const secOk  = state.sectionFilter === 'ALL' || p.section === state.sectionFilter;
    const dateOk = state.dateFilter    === 'ALL' || p.date    === state.dateFilter;
    return secOk && dateOk;
  });
  if (state.sortByDate) {
    pours = [...pours].sort((a, b) => {
      if (!a.date && !b.date) return 0;
      if (!a.date) return 1;
      if (!b.date) return -1;
      const [am,ad] = a.date.split('/').map(Number);
      const [bm,bd] = b.date.split('/').map(Number);
      return (am*100+ad) - (bm*100+bd);
    });
  }
  return pours;
}

function toggleSortByDate() {
  state.sortByDate = !state.sortByDate;
  const btn = document.getElementById('sortDateBtn');
  if (btn) {
    btn.style.cssText = state.sortByDate ? 'color:white;background:rgba(255,255,255,0.1);border-radius:4px' : '';
  }
  render();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const pours = filteredPours();
  const refs  = state.refs;

  renderZoneMap(pours);
  renderTimeline(state.pours); // always show all pours on timeline
  renderSectionCards(pours, refs);
  renderPourCards(pours);
  renderFooter();
  updateFilterPills();

  const hasContent = pours.length > 0;
  document.getElementById('emptyState').classList.toggle('hidden', hasContent || state.sectionFilter === 'ALL' && state.dateFilter === 'ALL');
  if (!hasContent && (state.sectionFilter !== 'ALL' || state.dateFilter !== 'ALL')) {
    document.getElementById('emptyState').classList.remove('hidden');
  }
}

// Zone Map — layout: C=left, B=upper-center, D=bottom-left, A=right (matches CUP site)
function renderZoneMap(pours) {
  const svg = document.getElementById('zoneSvg');
  // C=left, B=upper-center, A=right full height, D=bottom spanning under C+B
  const layout = [
    { s:'C', x:0,   y:0,   w:240, h:148 },
    { s:'B', x:244, y:0,   w:352, h:148 },
    { s:'A', x:600, y:0,   w:400, h:280 },
    { s:'D', x:0,   y:152, w:596, h:128 },
  ];
  const activeSec = state.sectionFilter;
  // Slurry hatching pattern
  let html = `<defs>
    <pattern id="slurryHatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>`;

  for (const z of layout) {
    const sec = z.s;
    const ref = state.refs[sec] || {};
    const active = activeSec === 'ALL' || activeSec === sec;
    const color = SEC_COLORS[sec];
    const dimFill = SEC_DIM[sec];
    const fill = active ? dimFill : '#0B0B0F';
    const stroke = active ? color : 'rgba(255,255,255,0.06)';
    const opacity = active ? 1 : 0.3;
    const secPours = pours.filter(p => p.section === sec);
    const slurryPour = secPours.find(p => p.id.endsWith('-1'));
    const structPour = secPours.find(p => !p.id.endsWith('-1') && !p.id.endsWith('-2') || p.id === 'D-3' || p.id === 'B-2' || p.id === 'C-2' || p.id === 'A-2');
    const cx = z.x + z.w/2;
    const cy = z.y + z.h/2;

    html += `<g style="cursor:pointer;opacity:${opacity}" onclick="setSectionFilter('${activeSec===sec?'ALL':sec}')">
      <rect x="${z.x+2}" y="${z.y+2}" width="${z.w-4}" height="${z.h-4}" rx="6" fill="${fill}" stroke="${stroke}" stroke-width="${active&&activeSec===sec?2.5:1}"/>`;
    // Slurry area indicator — hatched strip along bottom of zone
    if (ref.slurryVol) {
      const sh = Math.max(18, z.h * 0.2);
      html += `<rect x="${z.x+3}" y="${z.y+z.h-sh-2}" width="${z.w-6}" height="${sh}" rx="3" fill="url(#slurryHatch)" opacity="${active?0.8:0.3}"/>
        <text x="${z.x+z.w-10}" y="${z.y+z.h-sh+11}" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="8" fill="${color}" opacity="0.5">SLURRY ${ref.slurryVol} CY</text>`;
    }
    html += `<text x="${cx}" y="${cy-24}" text-anchor="middle" font-family="Inter,sans-serif" font-weight="900" font-size="${z.h>150?48:36}" fill="${color}" opacity="0.15">${sec}</text>
      <text x="${cx}" y="${cy}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-weight="700" font-size="${z.h>150?18:15}" fill="${color}">${ref.secTotal||'—'} CY</text>
      <text x="${cx}" y="${cy+16}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="rgba(255,255,255,0.5)">8000: ${ref.cy8000||0} · 5000: ${ref.cy5000||0}</text>`;
    // Pour dates
    const dates = secPours.map(p => p.date ? `${p.id}: ${p.date}` : '').filter(Boolean);
    if (dates.length) html += `<text x="${cx}" y="${cy+30}" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,0.25)">${dates.join(' · ')}</text>`;
    html += `</g>`;
  }
  svg.innerHTML = html;
}

// Timeline — Gantt-style with section swim lanes
function renderTimeline(pours) {
  const tl = document.getElementById('timelineContent');
  const dated = pours.filter(p => p.date).sort((a,b) => {
    const [am,ad] = (a.date||'').split('/').map(Number);
    const [bm,bd] = (b.date||'').split('/').map(Number);
    return (am*100+ad) - (bm*100+bd);
  });
  if (!dated.length) { document.getElementById('timelineWrap').classList.add('hidden'); return; }
  document.getElementById('timelineWrap').classList.remove('hidden');

  const parseMD = d => { const [m,dd] = d.split('/').map(Number); return new Date(2026, m-1, dd); };
  const allDated = pours.filter(p => p.date);
  const minD = parseMD(dated[0].date);
  const maxD = new Date(parseMD(dated[dated.length-1].date).getTime() + 3*86400000); // pad 3 days
  const range = Math.max(1, (maxD - minD) / 86400000);
  const pct = d => Math.max(1, Math.min(99, ((parseMD(d) - minD) / 86400000 / range) * 100));

  const sections = ['A','B','C','D'];
  const laneH = 34;
  const topPad = 18;
  const leftW = 28;
  const rightPad = 70;
  const totalH = topPad + sections.length * laneH;
  const daySpan = (maxD - minD) / 86400000;
  const pxPerDay = Math.max(24, 660 / Math.max(daySpan, 1));
  const chartW = daySpan * pxPerDay;

  let html = `<div class="relative" style="height:${totalH}px;min-width:${leftW + chartW + rightPad}px">`;

  // Date axis — clean week markers
  const step = daySpan > 21 ? 7 : daySpan > 10 ? 3 : 1;
  for (let i = 0; i <= daySpan; i += step) {
    const dd = new Date(minD.getTime() + i * 86400000);
    const x = leftW + i * pxPerDay;
    html += `<div class="absolute" style="left:${x}px;top:${topPad}px;width:1px;height:${totalH-topPad}px;background:rgba(255,255,255,0.04)"></div>`;
    html += `<div class="absolute mono font-semibold text-white/25" style="font-size:8px;left:${x}px;top:3px;transform:translateX(-50%)">${dd.getMonth()+1}/${dd.getDate()}</div>`;
  }

  // Swim lanes — thin marker + label to the right
  sections.forEach((sec, idx) => {
    const y = topPad + idx * laneH;
    const c = SEC_COLORS[sec];
    // Lane bg
    html += `<div class="absolute" style="left:${leftW}px;right:0;top:${y}px;height:${laneH}px;background:${c}06;border-bottom:1px solid rgba(255,255,255,0.03)"></div>`;
    // Section label
    html += `<div class="absolute mono font-black" style="font-size:9px;left:6px;top:${y + laneH/2 - 5}px;color:${c};opacity:0.6">${sec}</div>`;

    // Pours — thin colored marker with text to the right
    dated.filter(p => p.section === sec).forEach(p => {
      const dayOff = (parseMD(p.date) - minD) / 86400000;
      const x = leftW + dayOff * pxPerDay;
      const isSlurry = p.type === 'Slurry';
      const barColor = isSlurry ? '#6b7280' : c;
      const barH = laneH - 10;
      const barY = y + 5;

      // Marker
      html += `<div class="absolute rounded-sm group cursor-pointer" style="left:${x}px;top:${barY}px;width:8px;height:${barH}px;background:${barColor};box-shadow:0 0 4px ${barColor}44">
        <div class="absolute -top-7 left-0 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap bg-black/95 mono text-white px-2 py-1 rounded pointer-events-none z-20" style="font-size:9px;border:1px solid ${barColor}55">${p.id} · ${p.total} CY · ${p.date}</div>
      </div>`;
      // Label next to marker
      html += `<div class="absolute mono flex items-center gap-1" style="left:${x + 14}px;top:${barY}px;height:${barH}px;white-space:nowrap">
        <span class="font-bold text-white/80" style="font-size:10px">${p.id}</span>
        <span class="text-white/30 font-medium" style="font-size:9px">${p.total > 0 ? p.total+'CY' : ''}</span>
      </div>`;
    });
  });

  // Today line
  const today = new Date();
  const todayDays = (today - minD) / 86400000;
  if (todayDays >= 0 && todayDays <= daySpan) {
    const tx = leftW + todayDays * pxPerDay;
    html += `<div class="absolute z-10" style="left:${tx}px;top:${topPad}px;height:${totalH-topPad}px;width:2px;background:#fbbf24;opacity:0.5"></div>`;
    html += `<div class="absolute z-10 mono font-bold text-yellow-400/60" style="font-size:7px;left:${tx}px;top:${topPad-12}px;transform:translateX(-50%)">TODAY</div>`;
  }

  html += `</div>`;
  tl.innerHTML = html;
}

// Checklist loaded from Google Sheets "Pour Checklist" tab (gid=888)
let CHECKLIST_ITEMS = [];
const CHECKLIST_GID = 888;
const CHECKLIST_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${CHECKLIST_GID}`;

async function fetchChecklist() {
  try {
    const res = await fetch(CHECKLIST_URL);
    const text = await res.text();
    const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if (!m) return;
    const json = JSON.parse(m[1]);
    const rows = json.table.rows;

    const phases = {};
    const phaseOrder = [];
    for (const row of rows) {
      if (!row?.c) continue;
      const phase = anyStr(row, 0).trim();
      const what = anyStr(row, 1).trim();
      if (!phase || !what || phase === 'Phase') continue;
      const who = anyStr(row, 2).trim();
      const notes = anyStr(row, 3).trim();
      const protocol = anyStr(row, 4).trim();
      const note = protocol ? `${notes}. ${protocol}` : notes;

      if (!phases[phase]) { phases[phase] = []; phaseOrder.push(phase); }
      phases[phase].push({ what, who, note });
    }

    CHECKLIST_ITEMS = phaseOrder.map(phase => ({
      phase: phase === 'INSPECTIONS' ? `INSPECTIONS (${phases[phase].length} Required)` : phase,
      phaseKey: phase,
      items: phases[phase],
    }));
  } catch(e) { console.error('Checklist fetch error:', e); }
}

// Active pour for checklist (default: next upcoming)
let activeChecklistPour = null;

function getUpcomingPours() {
  const today = new Date();
  return state.pours
    .filter(p => p.date)
    .map(p => {
      const [m, d] = p.date.split('/').map(Number);
      return { ...p, dateObj: new Date(2026, m - 1, d) };
    })
    .sort((a, b) => a.dateObj - b.dateObj);
}

function getNextPour() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const upcoming = getUpcomingPours();
  return upcoming.find(p => p.dateObj >= today) || upcoming[upcoming.length - 1];
}

function checkKey(pourId, itemKey) { return `${pourId}__${itemKey}`; }
function getCheckState() {
  try { return JSON.parse(localStorage.getItem('cup_checklist') || '{}'); } catch { return {}; }
}
function saveCheckState(s) { localStorage.setItem('cup_checklist', JSON.stringify(s)); }
function toggleCheck(key) {
  const s = getCheckState();
  s[key] = !s[key];
  saveCheckState(s);
  renderChecklist();
}
function resetChecklist() {
  if (!activeChecklistPour) return;
  if (!confirm(`Reset checklist for ${activeChecklistPour.id}?`)) return;
  const s = getCheckState();
  Object.keys(s).forEach(k => { if (k.startsWith(activeChecklistPour.id + '__')) delete s[k]; });
  saveCheckState(s);
  renderChecklist();
}
function selectChecklistPour(pourId) {
  const all = getUpcomingPours();
  activeChecklistPour = all.find(p => p.id === pourId) || getNextPour();
  renderChecklist();
}

function renderChecklist() {
  const el = document.getElementById('checklistContent');
  if (!activeChecklistPour) activeChecklistPour = getNextPour();
  const pour = activeChecklistPour;
  if (!pour) { el.innerHTML = '<p class="text-white/30 text-center py-10">No pours with dates found</p>'; return; }

  const checks = getCheckState();
  const pid = pour.id;
  const totalItems = CHECKLIST_ITEMS.reduce((s, g) => s + g.items.length, 0);
  const doneCount = CHECKLIST_ITEMS.reduce((s, g) => s + g.items.filter(it => checks[checkKey(pid, it.what)]).length, 0);
  const pct = totalItems > 0 ? Math.round(doneCount / totalItems * 100) : 0;

  const phaseColorMap = { 'INSPECTIONS': '#FF6B6B', 'BEFORE POUR': '#4AB8FF', 'DURING POUR': '#FFBF00', 'AFTER POUR': '#41A447' };
  const phaseIconMap = { 'INSPECTIONS': 'assignment_turned_in', 'BEFORE POUR': 'checklist', 'DURING POUR': 'engineering', 'AFTER POUR': 'verified' };
  const getPhaseColor = (g) => phaseColorMap[g.phaseKey || g.phase] || '#888';
  const getPhaseIcon = (g) => phaseIconMap[g.phaseKey || g.phase] || 'check_circle';
  const secColor = SEC_COLORS[pour.section] || '#888';

  // Pour type description
  const typeDesc = pour.type === 'Slurry' ? 'Slurry Backfill' : pour.type === 'Plinth' ? 'Concrete Plinth' : 'Structural Concrete';
  const mixInfo = [];
  if (pour.cy8000 > 0) mixInfo.push(`${pour.cy8000} CY 8000 PSI`);
  if (pour.cy5000 > 0) mixInfo.push(`${pour.cy5000} CY 5000 PSI`);
  if (pour.slurry > 0) mixInfo.push(`${pour.slurry} CY S80S662L2 8sk`);

  let html = '';

  // Pour selector + info card
  const allPours = getUpcomingPours();
  html += `<div class="mb-4 p-4 rounded-xl border" style="background:#0B0B0F;border-color:${secColor}33">
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-2 flex-wrap">
        ${allPours.map(p => {
          const pc = SEC_COLORS[p.section] || '#888';
          const active = p.id === pid;
          const pDone = CHECKLIST_ITEMS.reduce((s,g) => s + g.items.filter(it => checks[checkKey(p.id, it.what)]).length, 0);
          const pPct = Math.round(pDone / totalItems * 100);
          return `<button onclick="selectChecklistPour('${p.id}')" class="px-2 py-1 rounded text-[10px] mono font-bold transition-all ${active ? 'text-white' : 'text-white/30 hover:text-white/50'}" style="${active ? 'background:'+pc+'33;border:1px solid '+pc+'66' : 'border:1px solid transparent'}">${p.id} ${pPct>0&&pPct<100?'('+pPct+'%)':pPct===100?'✓':''}</button>`;
        }).join('')}
      </div>
    </div>
    <div class="flex items-start gap-3">
      <div class="w-10 h-10 rounded-lg flex items-center justify-center shrink-0 text-lg font-black" style="background:${secColor}22;color:${secColor}">${pour.section}</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-sm font-bold text-white">${pour.id} — ${typeDesc}</span>
          <span class="mono text-xs text-white/40">${pour.date}</span>
        </div>
        <div class="text-xs text-white/50">${mixInfo.join(' · ') || 'No quantities set'} · ${pour.total} CY total · ${pour.trucks} trucks</div>
        ${pour.dateObj ? `<div class="text-[10px] mono mt-1" style="color:${secColor}">${Math.ceil((pour.dateObj - new Date()) / 86400000)} days from today</div>` : ''}
      </div>
    </div>
  </div>`;

  // Progress bar
  html += `<div class="mb-5 p-3 rounded-xl border border-white/5" style="background:#0B0B0F">
    <div class="flex items-center justify-between mb-1.5">
      <span class="text-[10px] font-bold text-white/40 uppercase tracking-wider">${pour.id} Progress</span>
      <span class="mono text-xs font-bold" style="color:${pct===100?'#41A447':'#FFBF00'}">${doneCount}/${totalItems} — ${pct}%</span>
    </div>
    <div class="h-1.5 rounded-full bg-white/5 overflow-hidden">
      <div class="h-full rounded-full transition-all duration-500" style="width:${pct}%;background:${pct===100?'#41A447':pct>50?'#FFBF00':'#4AB8FF'}"></div>
    </div>
  </div>`;

  CHECKLIST_ITEMS.forEach(group => {
    const c = getPhaseColor(group);
    const icon = getPhaseIcon(group);
    const groupDone = group.items.filter(it => checks[checkKey(pid, it.what)]).length;

    html += `<div class="mb-4">
      <div class="flex items-center gap-2 mb-2 px-1">
        <span class="material-symbols-outlined text-sm" style="color:${c}">${icon}</span>
        <span class="text-[11px] font-black uppercase tracking-widest" style="color:${c}">${group.phase}</span>
        <span class="text-[10px] mono text-white/30 ml-auto">${groupDone}/${group.items.length}</span>
      </div>`;

    group.items.forEach(item => {
      const key = checkKey(pid, item.what);
      const done = !!checks[key];
      html += `<div onclick="toggleCheck('${key.replace(/'/g, "\\'")}')" class="flex items-start gap-3 p-3 rounded-lg mb-1 cursor-pointer transition-all ${done ? 'bg-white/[0.02]' : 'bg-white/[0.04] hover:bg-white/[0.06]'}" style="border-left:3px solid ${done ? c+'55' : c}">
        <div class="mt-0.5 w-5 h-5 rounded flex items-center justify-center shrink-0 transition-all" style="background:${done ? c : 'transparent'};border:2px solid ${done ? c : 'rgba(255,255,255,0.15)'}">
          ${done ? '<span class="material-symbols-outlined text-black" style="font-size:14px;font-variation-settings:\'FILL\' 1">check</span>' : ''}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="text-sm font-semibold ${done ? 'text-white/30 line-through' : 'text-white/90'}">${item.what}</span>
            <span class="text-[9px] mono font-bold px-1.5 py-0.5 rounded ${done ? 'text-white/15 bg-white/[0.02]' : 'text-white/40 bg-white/[0.06]'}">${item.who}</span>
          </div>
          <p class="text-[11px] ${done ? 'text-white/15' : 'text-white/35'} mt-0.5 leading-relaxed">${item.note}</p>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  el.innerHTML = html;
}

function switchTab(tab) {
  const views = { dashboard:'dashboardView', checklist:'checklistView', pourday:'pourdayView' };
  const tabs = { dashboard:'tabDash', checklist:'tabCheck', pourday:'tabPour' };
  const active = 'tab-btn px-3 py-1 rounded-full text-xs font-bold transition-all bg-white/10 text-white';
  const inactive = 'tab-btn px-3 py-1 rounded-full text-xs font-bold transition-all text-white/40 hover:text-white/60';

  Object.values(views).forEach(id => document.getElementById(id)?.classList.add('hidden'));
  Object.values(tabs).forEach(id => { const el = document.getElementById(id); if (el) el.className = inactive; });

  document.getElementById(views[tab])?.classList.remove('hidden');
  const tabEl = document.getElementById(tabs[tab]); if (tabEl) tabEl.className = active;
  document.getElementById('footer')?.classList.toggle('hidden', tab !== 'dashboard');

  // Show/hide dashboard-only filters
  const filtersVisible = tab === 'dashboard';
  ['sectionFilters','dateFilters','sortDateBtn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = filtersVisible ? '' : 'none';
  });

  if (tab === 'checklist') renderChecklist();
  if (tab === 'pourday') renderPourDay();
}

// Footing status: cycles through '' → '25' → '50' → '75' → 'DONE' → ''
const FTG_STAGES = ['', '25', '50', '75', 'DONE'];
function getFootingStatus(id) { return pourDay.footingStatus[id] || localStorage.getItem('cup_ftg_'+id) || ''; }
function getFootingPct(id) { const s = getFootingStatus(id); return s === 'DONE' ? 100 : parseInt(s) || 0; }
function toggleFooting(id) {
  const cur = getFootingStatus(id);
  const idx = FTG_STAGES.indexOf(cur);
  const newStatus = FTG_STAGES[(idx + 1) % FTG_STAGES.length];
  pourDay.footingStatus[id] = newStatus;
  localStorage.setItem('cup_ftg_'+id, newStatus);
  fetch(API_URL, { method:'POST', mode:'no-cors', body:JSON.stringify({ action:'markFooting', footingId:id, status:newStatus }) }).catch(()=>{});
  renderPourDay();
}

function addFootingToMap(section, type) {
  const map = loadFootingMap(section);
  if (!map) return;
  const defaults = { ftg:{w:34,h:34}, pc:{w:70,h:55}, gb:{w:80,h:8} };
  const d = defaults[type] || defaults.ftg;
  const num = map.footings.length + 1;
  const ftype = prompt(`Footing type (e.g. ${type==='gb'?'GB1':'F8, PC4G'}):`, type==='gb'?'GB':'F8');
  if (!ftype) return;
  const cy = parseFloat(prompt('Concrete volume (CY):', FTG_PRESETS[ftype] || '0')) || 0;
  const id = `${ftype}-${num}`;
  map.footings.push({ id, x:400, y:300, w:d.w, h:d.h, cy, type, ftype });
  saveFootingMap(section, map);
  mapSelected = id;
  renderPourDay();
}

function editSelectedFooting(section) {
  if (!mapSelected) return;
  const map = loadFootingMap(section);
  const f = map?.footings.find(ft => ft.id === mapSelected);
  if (!f) return;
  const ftype = prompt('Footing type:', f.ftype);
  if (ftype === null) return;
  f.ftype = ftype;
  const cy = prompt('CY:', f.cy);
  if (cy !== null) f.cy = parseFloat(cy) || 0;
  const w = prompt('Width:', f.w);
  if (w !== null) f.w = parseInt(w) || f.w;
  const h = prompt('Height:', f.h);
  if (h !== null) f.h = parseInt(h) || f.h;
  saveFootingMap(section, map);
  renderPourDay();
}

function deleteSelectedFooting(section) {
  if (!mapSelected) return;
  const map = loadFootingMap(section);
  if (!map) return;
  map.footings = map.footings.filter(f => f.id !== mapSelected);
  saveFootingMap(section, map);
  mapSelected = null;
  renderPourDay();
}

// SVG drag support for edit mode
function initMapDrag() {
  const svg = document.querySelector('#pourdayContent svg');
  if (!svg) return;

  svg.addEventListener('pointerdown', e => {
    if (!mapEditMode) return;
    const el = e.target.closest('[data-ftg-id]');
    if (!el) { mapSelected = null; renderPourDay(); return; }
    const id = el.dataset.ftgId;
    mapSelected = id;
    const section = getActivePour()?.section;
    const map = loadFootingMap(section);
    const f = map?.footings.find(ft => ft.id === id);
    if (!f) return;

    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());

    mapDragging = { id, section, startX: svgP.x, startY: svgP.y, origX: f.x, origY: f.y };
    svg.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  svg.addEventListener('pointermove', e => {
    if (!mapDragging) return;
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());

    const dx = svgP.x - mapDragging.startX;
    const dy = svgP.y - mapDragging.startY;

    const map = loadFootingMap(mapDragging.section);
    const f = map?.footings.find(ft => ft.id === mapDragging.id);
    if (!f) return;
    f.x = Math.max(0, mapDragging.origX + dx);
    f.y = Math.max(0, mapDragging.origY + dy);

    // Live update the SVG element position
    const rect = svg.querySelector(`[data-ftg-id="${mapDragging.id}"]`);
    if (rect) { rect.setAttribute('x', f.x); rect.setAttribute('y', f.y); }
  });

  svg.addEventListener('pointerup', e => {
    if (!mapDragging) return;
    const map = loadFootingMap(mapDragging.section);
    saveFootingMap(mapDragging.section, map);
    mapDragging = null;
    renderPourDay(); // full re-render to update labels
  });
}

async function fetchPourDayData() {
  try {
    const res = await fetch(POURDAY_URL);
    const text = await res.text();
    const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if (!m) return;
    const json = JSON.parse(m[1]);
    const rows = json.table.rows;
    const trucks = [];
    for (const row of rows) {
      if (!row?.c) continue;
      const ts = anyStr(row, 0).trim();
      const pid = anyStr(row, 1).trim();
      if (!pid || pid === 'Pour ID') continue;
      trucks.push({
        timestamp: ts,
        pourId: pid,
        truckNum: anyNum(row, 2),
        ticket: anyStr(row, 3).trim(),
        cy: anyNum(row, 4),
        cumulative: anyNum(row, 5),
      });
    }
    pourDay.trucks = trucks;
  } catch(e) { console.error('Pour day fetch:', e); }
}

function getTodaysPours() {
  const today = new Date();
  const m = today.getMonth() + 1, d = today.getDate();
  const todayStr = `${m}/${d}`;
  return state.pours.filter(p => p.date === todayStr);
}

function getActivePour() {
  if (pourDay.activePourId) return state.pours.find(p => p.id === pourDay.activePourId);
  const todays = getTodaysPours();
  if (todays.length) return todays[0];
  // Fall back to next upcoming
  const upcoming = state.pours.filter(p => p.date).sort((a,b) => {
    const [am,ad] = a.date.split('/').map(Number);
    const [bm,bd] = b.date.split('/').map(Number);
    return (am*100+ad) - (bm*100+bd);
  });
  const now = new Date(); now.setHours(0,0,0,0);
  return upcoming.find(p => { const [pm,pd]=p.date.split('/').map(Number); return new Date(2026,pm-1,pd)>=now; }) || upcoming[0];
}

function selectPourDay(pourId) {
  pourDay.activePourId = pourId;
  renderPourDay();
}

async function logTruck() {
  const pour = getActivePour();
  if (!pour) return;
  const ticket = document.getElementById('pdTicketInput')?.value || '';
  const cy = pourDay.defaultCY;
  const prevCum = pourDay.trucks.filter(t => t.pourId === pour.id).reduce((s,t) => Math.max(s, t.cumulative), 0);
  const truckNum = pourDay.trucks.filter(t => t.pourId === pour.id).length + 1;

  // Optimistic update
  pourDay.trucks.push({
    timestamp: new Date().toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'}),
    pourId: pour.id, truckNum, ticket, cy, cumulative: prevCum + cy
  });
  renderPourDay();

  // Clear ticket
  const inp = document.getElementById('pdTicketInput');
  if (inp) inp.value = '';

  // POST to Apps Script
  fetch(API_URL, { method:'POST', mode:'no-cors',
    body:JSON.stringify({ action:'logTruck', pourId:pour.id, ticketNum:ticket, cy })
  }).catch(()=>{});
}

  pourDay.defaultCY = cy;
  renderPourDay();
}

          <rect width="900" height="620" fill="url(#fgrid)"/>
          <!-- Grid lines + labels -->
          ${(mapData.gridCols||[]).map(g => `<line x1="${g.x}" y1="20" x2="${g.x}" y2="600" stroke="rgba(255,255,255,0.04)" stroke-width="1"/><text x="${g.x}" y="615" text-anchor="middle" font-size="9" font-family="JetBrains Mono" fill="rgba(255,255,255,0.12)">${g.label}</text>`).join('')}
          ${(mapData.gridRows||[]).map(g => `<line x1="10" y1="${g.y}" x2="880" y2="${g.y}" stroke="rgba(255,255,255,0.03)" stroke-width="1"/><text x="885" y="${g.y+4}" text-anchor="end" font-size="8" font-family="JetBrains Mono" fill="rgba(255,255,255,0.10)">${g.label}</text>`).join('')}
          <!-- Footings -->
          ${ftgs.map(f => {
            const pct = getFootingPct(f.id);
            const done = pct === 100;
            const active = pct > 0 && pct < 100;
            const fc = f.type==='gb' ? '#888' : c;
            const rx = f.type==='gb' ? 2 : f.type==='pc' ? 4 : 6;
            const cx = f.x + f.w/2, cy2 = f.y + f.h/2;
            const labelSize = f.w > 50 ? 11 : f.w > 30 ? 9 : 7;

            // Clip path for partial fill (fills from bottom up)
            const clipId = 'clip_'+f.id.replace(/[^a-zA-Z0-9]/g,'_');
            const fillH = f.h * (pct / 100);
            const fillY = f.y + f.h - fillH;

            let svg = '';
            const gbColor = '#FFB800';
            const shapeColor = isGB ? gbColor : fc;
            const selected = mapEditMode && mapSelected === f.id;
            const clickAction = mapEditMode ? `mapSelected='${f.id}';renderPourDay()` : `toggleFooting('${f.id}')`;
            // Base shape
            svg += `<rect data-ftg-id="${f.id}" x="${f.x}" y="${f.y}" width="${f.w}" height="${f.h}" rx="${rx}" fill="${isGB ? gbColor+'22' : shapeColor+'11'}" stroke="${selected ? '#fff' : (isGB ? gbColor+'88' : shapeColor+(done?'':'44'))}" stroke-width="${selected?2.5:1.5}" class="cursor-pointer" onclick="${clickAction}"/>`;
            // Filled portion (from bottom up based on %)
            if (pct > 0) {
              svg += `<defs><clipPath id="${clipId}"><rect x="${f.x}" y="${fillY}" width="${f.w}" height="${fillH}"/></clipPath></defs>`;
              svg += `<rect x="${f.x}" y="${f.y}" width="${f.w}" height="${f.h}" rx="${rx}" fill="${shapeColor}" opacity="${done?1:0.6}" clip-path="url(#${clipId})" pointer-events="none"/>`;
            }
            const isGB = f.type === 'gb';
            const ftypeLabel = f.ftype || '';
            if (isGB) {
              // Grade beam: show type label centered
              svg += `<text x="${cx}" y="${cy2+3}" text-anchor="middle" dominant-baseline="central" font-size="7" font-family="JetBrains Mono" fill="#FFB80088" font-weight="600" pointer-events="none">${ftypeLabel} ${f.cy}CY</text>`;
            } else {
              // Footing type (primary label)
              svg += `<text x="${cx}" y="${cy2 - (f.h > 50 ? 8 : 3)}" text-anchor="middle" dominant-baseline="central" font-size="${labelSize}" font-family="JetBrains Mono" fill="${done?'#000':active?'white':'white'}" font-weight="700" pointer-events="none">${ftypeLabel}</text>`;
              // CY value (secondary, below type)
              if (f.h > 40) svg += `<text x="${cx}" y="${cy2+8}" text-anchor="middle" font-size="8" font-family="JetBrains Mono" fill="${done?'#000':'rgba(255,255,255,0.5)'}" pointer-events="none">${f.cy}CY</text>`;
              // Status badge
              if (done) {
                svg += `<text x="${f.x+f.w-3}" y="${f.y+10}" text-anchor="end" font-size="9" fill="#000" font-weight="800" pointer-events="none">✓</text>`;
              } else if (active) {
                svg += `<text x="${cx}" y="${cy2 + (f.h > 50 ? 20 : 12)}" text-anchor="middle" font-size="8" font-family="JetBrains Mono" fill="white" font-weight="700" pointer-events="none">${pct}%</text>`;
              }
            }
            // Element ID (below shape, tiny)
            if (!isGB) svg += `<text x="${cx}" y="${f.y+f.h+9}" text-anchor="middle" font-size="6" fill="rgba(255,255,255,0.15)" font-family="JetBrains Mono" pointer-events="none">${f.id}</text>`;
            return svg;
          }).join('')}
        </svg>
      </div>
      <div class="px-4 py-2 border-t border-white/5 flex items-center gap-4 text-[9px] flex-wrap">
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded border" style="border-color:${c};background:${c}11"></span><span class="text-white/40">Not started</span></span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded" style="background:linear-gradient(to top,${c}99 50%,${c}11 50%)"></span><span class="text-white/40">In progress</span></span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded" style="background:${c}"></span><span class="text-white/40">100% Done</span></span>
        ${!isManagerView ? '<span class="ml-auto text-white/20 italic">Tap to cycle: 0→25→50→75→100→0</span>' : ''}
      </div>
    </div>`;
  }

  // Truck button + ticket input (hidden for managers)
  if (!isManagerView) {
    h += `<div class="space-y-2 mb-4">
      <button onclick="logTruck()" class="w-full py-5 rounded-xl font-black text-xl tracking-wide active:scale-[0.98] transition-transform flex items-center justify-center gap-3" style="background:${c};color:#000">
        <span class="material-symbols-outlined text-2xl">local_shipping</span>
        TRUCK ARRIVED — ${pourDay.defaultCY} CY
      </button>
      <div class="flex gap-2">
        <div class="flex gap-1">
          ${[7,8,9,10,11].map(cy =>
            `<button onclick="setPourDayCY(${cy})" class="px-3 py-1.5 rounded text-xs mono font-bold transition-all ${pourDay.defaultCY===cy?'bg-white/15 text-white':'bg-white/5 text-white/30 hover:text-white/50'}">${cy}</button>`
          ).join('')}
        </div>
        <input id="pdTicketInput" type="text" placeholder="Ticket #" class="flex-1 bg-white/5 border border-white/10 rounded px-3 py-1.5 text-xs mono text-white/70 placeholder:text-white/20 focus:outline-none focus:border-white/30">
      </div>
    </div>`;
  }

  // Truck log
  const reverseTrucks = [...pourTrucks].reverse();
  if (reverseTrucks.length) {
    h += `<div class="rounded-xl border border-white/5 overflow-hidden" style="background:#0B0B0F">
      <div class="px-4 py-2 border-b border-white/5 flex items-center justify-between">
        <span class="text-[10px] font-bold text-white/40 uppercase tracking-wider">Truck Log</span>
        <span class="text-[10px] mono text-white/20">${pourTrucks.length} arrivals</span>
      </div>
      <div class="max-h-64 overflow-y-auto">
        ${reverseTrucks.map(t => `
          <div class="px-4 py-2 flex items-center justify-between border-b border-white/[0.03] text-xs">
            <div class="flex items-center gap-3">
              <span class="mono font-bold text-white/60">#${t.truckNum}</span>
              <span class="mono font-bold text-white">${t.cy} CY</span>
              ${t.ticket ? `<span class="mono text-white/30">${t.ticket}</span>` : ''}
            </div>
            <div class="flex items-center gap-3">
              <span class="mono text-white/20">${t.timestamp}</span>
              <span class="mono font-bold" style="color:${c}">${t.cumulative} CY</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  } else {
    h += `<div class="text-center py-8 text-white/20 text-sm rounded-xl border border-white/5" style="background:#0B0B0F">No trucks logged yet — tap the button when a truck arrives</div>`;
  }

  el.innerHTML = h;
  if (mapEditMode) requestAnimationFrame(initMapDrag);
}

init();
setInterval(async () => {
  try {
    await Promise.all([fetchChecklist(), fetchPourDayData()]);
    const { refs, pours, grand } = await fetchData();
    state.refs  = refs;
    state.pours = pours;
    state.grand = grand;
    render();
  } catch(e) { /* silent */ }
}, 30000);
</script>
</body>
</html>

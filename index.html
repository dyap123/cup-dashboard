<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID = '1fTL_w-kLz0Jzwni9r3kSuGqSvlsFhNm0RsfRurQH750';
const GID      = '999';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit#gid=${GID}`;
const GViz_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

document.getElementById('sheetLink').href       = SHEET_URL;
document.getElementById('footerSheetLink').href = SHEET_URL;

const SEC_COLORS = { A:'#41A447', B:'#FF8C00', C:'#4AB8FF', D:'#8B5CF6' };
const SEC_DIM    = { A:'#162a18', B:'#3a2200', C:'#1a2d4d', D:'#2a1a4d' };

// Editable pour labels (persisted in localStorage)
function getPourLabel(id) { return localStorage.getItem('cup_label_'+id) || ''; }
function setPourLabel(id, val) { localStorage.setItem('cup_label_'+id, val); }

// Ordered status — writes to sheet via Apps Script
const API_URL = 'https://script.google.com/macros/s/AKfycbwNOYItk1zZdQbVktGTND9TIloio1Su4FFIuccoX2hG22FpKug9M-3C3h5zgtkNFmks/exec';
function getOrdered(id) { return localStorage.getItem('cup_ordered_'+id) === 'YES'; }
function toggleOrdered(id) {
  const newVal = !getOrdered(id);
  localStorage.setItem('cup_ordered_'+id, newVal ? 'YES' : 'NO');
  // Write to sheet
  fetch(API_URL, { method:'POST', mode:'no-cors', body:JSON.stringify({ pourId:id, ordered:newVal }) }).catch(()=>{});
  render();
}

// ── PARSER HELPERS ───────────────────────────────────────────────────────────
function anyNum(row, idx) {
  const c = row?.c?.[idx];
  if (!c || c.v == null) return 0;
  if (typeof c.v === 'number') return c.v;
  if (typeof c.v === 'string') { const n = parseFloat(c.v.replace(/,/g,'')); return isNaN(n) ? 0 : n; }
  return 0;
}
function anyStr(row, idx) {
  const c = row?.c?.[idx];
  if (!c || c.v == null) return '';
  return String(c.v);
}
function anyDate(row, idx) {
  const c = row?.c?.[idx];
  if (!c || c.v == null) return null;
  const v = String(c.v);
  if (v.startsWith('Date(')) {
    const p = v.match(/Date\((\d+),(\d+),(\d+)\)/);
    if (p && parseInt(p[1]) > 2000) return `${parseInt(p[2])+1}/${p[3]}`;
  }
  if (c.f) return c.f;
  return null;
}

// ── STATE ────────────────────────────────────────────────────────────────────
let state = { refs:{}, pours:[], grand:{}, sectionFilter:'ALL', dateFilter:'ALL' };
// ── FETCH & PARSE (formatted sheet with REFERENCE + ORDER SUMMARY sections) ──
async function fetchData() {
  const res  = await fetch(GViz_URL);
  const text = await res.text();
  const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!m) throw new Error('Invalid response from Google Sheets');
  const json = JSON.parse(m[1]);
  const rows = json.table.rows;

  const refs = {}, pours = [];
  let grand = { cy8000:0, cy5000:0, slurry:0, total:0, trucks:0 };
  let mode = 'ref'; // start with reference rows (gviz skips header rows)

  for (const row of rows) {
    if (!row?.c) continue;
    const a = anyStr(row, 0).trim();

    // Reference rows (A/B/C/D at the start)
    if (mode === 'ref' && ['A','B','C','D'].includes(a)) {
      const cy8000 = anyNum(row, 1);
      const slurryVol = anyNum(row, 3);
      const plinthVol = anyNum(row, 5);
      const secTotal = anyNum(row, 6);
      const cy5000 = Math.max(0, secTotal - cy8000 - slurryVol - plinthVol);
      refs[a] = { cy8000, cy5000, slurryVol, plinthVol, secTotal };
      continue;
    }
    if (a === 'TOTAL') { mode = 'scan'; continue; }

    // Find ORDER SUMMARY
    if (a === 'ORDER SUMMARY') { mode = 'order_skip'; continue; }
    if (mode === 'order_skip') { mode = 'order'; continue; } // skip header row

    // Parse order rows
    if (mode === 'order') {
      if (a === 'GRAND TOTAL') {
        grand = {
          cy8000: anyNum(row, 3), cy5000: anyNum(row, 4),
          slurry: anyNum(row, 5), total: anyNum(row, 6), trucks: anyNum(row, 7),
        };
        break;
      }
      if (/^[A-D]-[1-9]/.test(a)) {
        pours.push({
          id: a, section: anyStr(row, 1).trim() || a[0],
          date: anyDate(row, 2),
          cy8000: anyNum(row, 3), cy5000: anyNum(row, 4),
          slurry: anyNum(row, 5), total: anyNum(row, 6),
          trucks: anyNum(row, 7), status: anyStr(row, 8).trim(),
          label: '', type: '',
        });
      }
    }
  }

  // Infer type from data
  for (const p of pours) {
    if (p.slurry > 0 && p.cy8000 === 0 && p.cy5000 === 0) p.type = 'Slurry';
    else if (p.total <= 5 && p.cy8000 > 0 && p.cy5000 === 0 && p.slurry === 0) p.type = 'Plinth';
    else p.type = 'Structural';
  }

  return { refs, pours, grand };
}

function openSheet() { window.open(SHEET_URL, '_blank'); }

// ── FILTER LOGIC ─────────────────────────────────────────────────────────────
function filteredPours() {
  return state.pours.filter(p => {
    const secOk  = state.sectionFilter === 'ALL' || p.section === state.sectionFilter;
    const dateOk = state.dateFilter    === 'ALL' || p.date    === state.dateFilter;
    return secOk && dateOk;
  });
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const pours = filteredPours();
  const refs  = state.refs;

  renderZoneMap(pours);
  renderTimeline(state.pours); // always show all pours on timeline
  renderSectionCards(pours, refs);
  renderPourCards(pours);
  renderFooter();
  updateFilterPills();

  const hasContent = pours.length > 0;
  document.getElementById('emptyState').classList.toggle('hidden', hasContent || state.sectionFilter === 'ALL' && state.dateFilter === 'ALL');
  if (!hasContent && (state.sectionFilter !== 'ALL' || state.dateFilter !== 'ALL')) {
    document.getElementById('emptyState').classList.remove('hidden');
  }
}

// Zone Map — layout: C=left, B=upper-center, D=bottom-left, A=right (matches CUP site)
function renderZoneMap(pours) {
  const svg = document.getElementById('zoneSvg');
  // C=left, B=upper-center, A=right full height, D=bottom spanning under C+B
  const layout = [
    { s:'C', x:0,   y:0,   w:240, h:148 },
    { s:'B', x:244, y:0,   w:352, h:148 },
    { s:'A', x:600, y:0,   w:400, h:280 },
    { s:'D', x:0,   y:152, w:596, h:128 },
  ];
  const activeSec = state.sectionFilter;
  // Slurry hatching pattern
  let html = `<defs>
    <pattern id="slurryHatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>`;

  for (const z of layout) {
    const sec = z.s;
    const ref = state.refs[sec] || {};
    const active = activeSec === 'ALL' || activeSec === sec;
    const color = SEC_COLORS[sec];
    const dimFill = SEC_DIM[sec];
    const fill = active ? dimFill : '#0B0B0F';
    const stroke = active ? color : 'rgba(255,255,255,0.06)';
    const opacity = active ? 1 : 0.3;
    const secPours = pours.filter(p => p.section === sec);
    const slurryPour = secPours.find(p => p.id.endsWith('-1'));
    const structPour = secPours.find(p => !p.id.endsWith('-1') && !p.id.endsWith('-2') || p.id === 'D-3' || p.id === 'B-2' || p.id === 'C-2' || p.id === 'A-2');
    const cx = z.x + z.w/2;
    const cy = z.y + z.h/2;

    html += `<g style="cursor:pointer;opacity:${opacity}" onclick="setSectionFilter('${activeSec===sec?'ALL':sec}')">
      <rect x="${z.x+2}" y="${z.y+2}" width="${z.w-4}" height="${z.h-4}" rx="6" fill="${fill}" stroke="${stroke}" stroke-width="${active&&activeSec===sec?2.5:1}"/>`;
    // Slurry area indicator — hatched strip along bottom of zone
    if (ref.slurryVol) {
      const sh = Math.max(18, z.h * 0.2);
      html += `<rect x="${z.x+3}" y="${z.y+z.h-sh-2}" width="${z.w-6}" height="${sh}" rx="3" fill="url(#slurryHatch)" opacity="${active?0.8:0.3}"/>
        <text x="${z.x+z.w-10}" y="${z.y+z.h-sh+11}" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="8" fill="${color}" opacity="0.5">SLURRY ${ref.slurryVol} CY</text>`;
    }
    html += `<text x="${cx}" y="${cy-24}" text-anchor="middle" font-family="Inter,sans-serif" font-weight="900" font-size="${z.h>150?48:36}" fill="${color}" opacity="0.15">${sec}</text>
      <text x="${cx}" y="${cy}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-weight="700" font-size="${z.h>150?18:15}" fill="${color}">${ref.secTotal||'—'} CY</text>
      <text x="${cx}" y="${cy+16}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="rgba(255,255,255,0.5)">8000: ${ref.cy8000||0} · 5000: ${ref.cy5000||0}</text>`;
    // Pour dates
    const dates = secPours.map(p => p.date ? `${p.id}: ${p.date}` : '').filter(Boolean);
    if (dates.length) html += `<text x="${cx}" y="${cy+30}" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,0.25)">${dates.join(' · ')}</text>`;
    html += `</g>`;
  }
  svg.innerHTML = html;
}

// Timeline — Gantt-style with section swim lanes
function renderTimeline(pours) {
  const tl = document.getElementById('timelineContent');
  const dated = pours.filter(p => p.date).sort((a,b) => {
    const [am,ad] = (a.date||'').split('/').map(Number);
    const [bm,bd] = (b.date||'').split('/').map(Number);
    return (am*100+ad) - (bm*100+bd);
  });
  if (!dated.length) { document.getElementById('timelineWrap').classList.add('hidden'); return; }
  document.getElementById('timelineWrap').classList.remove('hidden');

  const parseMD = d => { const [m,dd] = d.split('/').map(Number); return new Date(2026, m-1, dd); };
  const allDated = pours.filter(p => p.date);
  const minD = parseMD(dated[0].date);
  const maxD = new Date(parseMD(dated[dated.length-1].date).getTime() + 3*86400000); // pad 3 days
  const range = Math.max(1, (maxD - minD) / 86400000);
  const pct = d => Math.max(1, Math.min(99, ((parseMD(d) - minD) / 86400000 / range) * 100));

  const sections = ['A','B','C','D'];
  const laneH = 34;
  const topPad = 18;
  const leftW = 28;
  const rightPad = 70;
  const totalH = topPad + sections.length * laneH;
  const daySpan = (maxD - minD) / 86400000;
  const pxPerDay = Math.max(24, 660 / Math.max(daySpan, 1));
  const chartW = daySpan * pxPerDay;

  let html = `<div class="relative" style="height:${totalH}px;min-width:${leftW + chartW + rightPad}px">`;

  // Date axis — clean week markers
  const step = daySpan > 21 ? 7 : daySpan > 10 ? 3 : 1;
  for (let i = 0; i <= daySpan; i += step) {
    const dd = new Date(minD.getTime() + i * 86400000);
    const x = leftW + i * pxPerDay;
    html += `<div class="absolute" style="left:${x}px;top:${topPad}px;width:1px;height:${totalH-topPad}px;background:rgba(255,255,255,0.04)"></div>`;
    html += `<div class="absolute mono font-semibold text-white/25" style="font-size:8px;left:${x}px;top:3px;transform:translateX(-50%)">${dd.getMonth()+1}/${dd.getDate()}</div>`;
  }

  // Swim lanes — thin marker + label to the right
  sections.forEach((sec, idx) => {
    const y = topPad + idx * laneH;
    const c = SEC_COLORS[sec];
    // Lane bg
    html += `<div class="absolute" style="left:${leftW}px;right:0;top:${y}px;height:${laneH}px;background:${c}06;border-bottom:1px solid rgba(255,255,255,0.03)"></div>`;
    // Section label
    html += `<div class="absolute mono font-black" style="font-size:9px;left:6px;top:${y + laneH/2 - 5}px;color:${c};opacity:0.6">${sec}</div>`;

    // Pours — thin colored marker with text to the right
    dated.filter(p => p.section === sec).forEach(p => {
      const dayOff = (parseMD(p.date) - minD) / 86400000;
      const x = leftW + dayOff * pxPerDay;
      const isSlurry = p.type === 'Slurry';
      const barColor = isSlurry ? '#6b7280' : c;
      const barH = laneH - 10;
      const barY = y + 5;

      // Marker
      html += `<div class="absolute rounded-sm group cursor-pointer" style="left:${x}px;top:${barY}px;width:8px;height:${barH}px;background:${barColor};box-shadow:0 0 4px ${barColor}44">
        <div class="absolute -top-7 left-0 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap bg-black/95 mono text-white px-2 py-1 rounded pointer-events-none z-20" style="font-size:9px;border:1px solid ${barColor}55">${p.id} · ${p.total} CY · ${p.date}</div>
      </div>`;
      // Label next to marker
      html += `<div class="absolute mono flex items-center gap-1" style="left:${x + 14}px;top:${barY}px;height:${barH}px;white-space:nowrap">
        <span class="font-bold text-white/80" style="font-size:10px">${p.id}</span>
        <span class="text-white/30 font-medium" style="font-size:9px">${p.total > 0 ? p.total+'CY' : ''}</span>
      </div>`;
    });
  });

  // Today line
  const today = new Date();
  const todayDays = (today - minD) / 86400000;
  if (todayDays >= 0 && todayDays <= daySpan) {
    const tx = leftW + todayDays * pxPerDay;
    html += `<div class="absolute z-10" style="left:${tx}px;top:${topPad}px;height:${totalH-topPad}px;width:2px;background:#fbbf24;opacity:0.5"></div>`;
    html += `<div class="absolute z-10 mono font-bold text-yellow-400/60" style="font-size:7px;left:${tx}px;top:${topPad-12}px;transform:translateX(-50%)">TODAY</div>`;
  }

  html += `</div>`;
  tl.innerHTML = html;
}

// Section Summary Cards
function renderSectionCards(pours, refs) {

  const secs = state.sectionFilter === 'ALL' ? ['A','B','C','D'] : [state.sectionFilter];
  grid.innerHTML = secs.map(s => {
    const r = refs[s] || {};
    const c = SEC_COLORS[s];
    return `<div class="rounded-xl p-4 border border-white/5" style="background:#0B0B0F;border-left:3px solid ${c}">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-xs font-bold px-2 py-0.5 rounded" style="background:${c}22;color:${c}">SECTION ${s}</span>
      </div>
      <div class="mono text-2xl font-bold mb-3" style="color:${c}">${r.secTotal||'—'} <span class="text-sm text-white/40 font-normal">CY</span></div>
      <div class="space-y-1 text-xs">
        <div class="flex justify-between"><span class="text-white/50">8000 PSI</span><span class="mono font-semibold text-red-300">${r.cy8000||0} CY</span></div>
        <div class="flex justify-between"><span class="text-white/50">5000 PSI</span><span class="mono font-semibold text-blue-300">${r.cy5000||0} CY</span></div>

      </div>

// Pour Cards
function renderPourCards(pours) {
  const grid = document.getElementById('pourGrid');
  if (!pours.length) { grid.innerHTML = ''; return; }

  const maxCy8000 = Math.max(...pours.map(p => p.cy8000), 1);
  const maxCy5000 = Math.max(...pours.map(p => p.cy5000), 1);

  grid.innerHTML = pours.map(p => {
    const c     = SEC_COLORS[p.section] || '#888';
    const pct8  = Math.round((p.cy8000 / maxCy8000) * 100);
    const pct5  = Math.round((p.cy5000 / maxCy5000) * 100);
    const isOrdered = p.status?.toLowerCase().includes('yes') || getOrdered(p.id);
    return `<div class="rounded-xl p-4 border ${isOrdered ? 'border-green-500/30' : 'border-white/5'}" style="background:#0B0B0F">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="text-xs font-bold px-2 py-0.5 rounded" style="background:${c}22;color:${c}">${p.section}</span>
          <span class="mono font-bold text-sm text-white/90">${p.id}</span>
          <span class="text-xs text-white/40 italic">${p.label || getPourLabel(p.id) || ''}</span>
          ${!p.label && !getPourLabel(p.id) ? `<input type="text" class="bg-transparent border-b border-dashed border-white/15 text-xs text-white/50 w-20 px-1 py-0.5 focus:border-white/40 focus:outline-none placeholder:text-white/15 placeholder:italic" placeholder="+ label" onchange="setPourLabel('${p.id}',this.value);render()"/>` : ''}
        </div>
        <div class="flex items-center gap-2">
          ${p.date ? `<span class="text-xs text-white/40 mono">${p.date}</span>` : ''}
          <button onclick="toggleOrdered('${p.id}')" class="text-[10px] font-bold px-2.5 py-1 rounded-full transition-all ${isOrdered ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-white/5 text-white/30 border border-white/10 hover:text-white/50'}">${isOrdered ? 'ORDERED' : 'PENDING'}</button>
        </div>
      </div>
      ${p.cy8000 > 0 ? `<div class="mb-2">
        <div class="flex justify-between text-xs mb-1"><span class="text-white/50">8000 PSI</span><span class="mono text-red-300 font-semibold">${p.cy8000} CY</span></div>
        <div class="h-1.5 rounded-full bg-white/5 overflow-hidden"><div class="h-full rounded-full bg-gradient-to-r from-red-600 to-orange-400 bar-animate" style="width:${pct8}%"></div></div>
      </div>` : ''}
      ${p.cy5000 > 0 ? `<div class="mb-2">
        <div class="flex justify-between text-xs mb-1"><span class="text-white/50">5000 PSI</span><span class="mono text-blue-300 font-semibold">${p.cy5000} CY</span></div>
        <div class="h-1.5 rounded-full bg-white/5 overflow-hidden"><div class="h-full rounded-full bg-gradient-to-r from-blue-600 to-cyan-400 bar-animate" style="width:${pct5}%"></div></div>
      </div>` : ''}
      ${p.slurry > 0 ? `<div class="mb-3">
        <div class="flex justify-between text-xs mb-1"><span class="text-white/50">Slurry (S80S662L2)</span><span class="mono text-gray-300 font-semibold">${p.slurry} CY</span></div>
        <div class="h-1.5 rounded-full bg-white/5 overflow-hidden"><div class="h-full rounded-full bg-gradient-to-r from-gray-500 to-gray-400 bar-animate" style="width:${Math.round((p.slurry/Math.max(...pours.map(x=>x.slurry),1))*100)}%"></div></div>
      </div>` : ''}
      <div class="flex items-center justify-between pt-2 border-t border-white/5">
        <span class="mono text-yellow-300 font-bold text-sm">${p.total} <span class="text-white/40 font-normal text-xs">CY</span></span>
        <span class="text-xs text-white/40">${p.trucks} trucks</span>
      </div>
    </div>`;
  }).join('');
}

// Footer
function renderFooter() {

  document.getElementById('ftCy8000').textContent = g.cy8000  ?? '—';
  document.getElementById('ftCy5000').textContent = g.cy5000  ?? '—';
  document.getElementById('ftSlurry').textContent = g.slurry  ?? '—';

}

// ── FILTER CONTROLS ───────────────────────────────────────────────────────────
function setSectionFilter(sec) {
  state.sectionFilter = sec;
  render();
}

function setDateFilter(date) {
  state.dateFilter = date;
  render();
}

function updateFilterPills() {
  // Section pills
  document.querySelectorAll('.sec-pill').forEach(btn => {
    const s   = btn.dataset.sec;
    const col = SEC_COLORS[s];
    const active = state.sectionFilter === s;
    if (active && s === 'ALL') {
      btn.style.cssText = 'background:rgba(255,255,255,0.12);color:white;border:1px solid rgba(255,255,255,0.2)';
    } else if (active && col) {
      btn.style.cssText = `background:${col}33;color:${col};border:1px solid ${col}66`;
    } else {
      btn.style.cssText = 'background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.06)';
    }
  });

  // Date pills
  const dates   = [...new Set(state.pours.map(p => p.date).filter(Boolean))].sort();
  const dateCnt = document.getElementById('dateFilters');
  dateCnt.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.textContent = 'ALL DATES';
  allBtn.onclick = () => setDateFilter('ALL');
  allBtn.className = 'px-3 py-1 rounded-full text-xs font-semibold transition-all shrink-0';
  allBtn.style.cssText = state.dateFilter === 'ALL'
    ? 'background:rgba(255,255,255,0.12);color:white;border:1px solid rgba(255,255,255,0.2)'
    : 'background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.06)';
  dateCnt.appendChild(allBtn);

  for (const d of dates) {
    const btn = document.createElement('button');
    btn.textContent = d;
    btn.onclick = () => setDateFilter(d);
    btn.className = 'px-3 py-1 rounded-full text-xs font-mono font-semibold transition-all shrink-0';
    btn.style.cssText = state.dateFilter === d
      ? 'background:rgba(255,215,0,0.18);color:#facc15;border:1px solid rgba(250,204,21,0.4)'
      : 'background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.06)';
    dateCnt.appendChild(btn);
  }
}

async function init() {
  try {
    const { refs, pours, grand } = await fetchData();
    state.refs  = refs;
    state.pours = pours;
    state.grand = grand;

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('zoneMap').classList.remove('hidden');
    document.getElementById('sectionGrid').classList.remove('hidden');

      `<p class="text-red-400 text-sm">Error loading data. Check console.</p>`;
  }
}

  { phase: 'INSPECTIONS (5 Required)', items: [

// Active pour for checklist (default: next upcoming)
let activeChecklistPour = null;

function getUpcomingPours() {
  const today = new Date();
  return state.pours
    .filter(p => p.date)
    .map(p => {
      const [m, d] = p.date.split('/').map(Number);
      return { ...p, dateObj: new Date(2026, m - 1, d) };
    })
    .sort((a, b) => a.dateObj - b.dateObj);
}

function getNextPour() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const upcoming = getUpcomingPours();
  return upcoming.find(p => p.dateObj >= today) || upcoming[upcoming.length - 1];
}

function checkKey(pourId, itemKey) { return `${pourId}__${itemKey}`; }
function getCheckState() {
  try { return JSON.parse(localStorage.getItem('cup_checklist') || '{}'); } catch { return {}; }
}
function saveCheckState(s) { localStorage.setItem('cup_checklist', JSON.stringify(s)); }
function toggleCheck(key) {
  const s = getCheckState();
  s[key] = !s[key];
  saveCheckState(s);
  renderChecklist();
}
function resetChecklist() {
  if (!activeChecklistPour) return;
  if (!confirm(`Reset checklist for ${activeChecklistPour.id}?`)) return;
  const s = getCheckState();
  Object.keys(s).forEach(k => { if (k.startsWith(activeChecklistPour.id + '__')) delete s[k]; });
  saveCheckState(s);
  renderChecklist();
}
function selectChecklistPour(pourId) {
  const all = getUpcomingPours();
  activeChecklistPour = all.find(p => p.id === pourId) || getNextPour();
  renderChecklist();
}

function renderChecklist() {
  const el = document.getElementById('checklistContent');
  if (!activeChecklistPour) activeChecklistPour = getNextPour();
  const pour = activeChecklistPour;
  if (!pour) { el.innerHTML = '<p class="text-white/30 text-center py-10">No pours with dates found</p>'; return; }

  const checks = getCheckState();
  const pid = pour.id;
  const totalItems = CHECKLIST_ITEMS.reduce((s, g) => s + g.items.length, 0);
  const doneCount = CHECKLIST_ITEMS.reduce((s, g) => s + g.items.filter(it => checks[checkKey(pid, it.what)]).length, 0);
  const pct = totalItems > 0 ? Math.round(doneCount / totalItems * 100) : 0;

  const phaseColors = { 'INSPECTIONS (5 Required)': '#FF6B6B', 'BEFORE POUR': '#4AB8FF', 'DURING POUR': '#FFBF00', 'AFTER POUR': '#41A447' };
  const phaseIcons = { 'INSPECTIONS (5 Required)': 'assignment_turned_in', 'BEFORE POUR': 'checklist', 'DURING POUR': 'engineering', 'AFTER POUR': 'verified' };
  const secColor = SEC_COLORS[pour.section] || '#888';

  // Pour type description
  const typeDesc = pour.type === 'Slurry' ? 'Slurry Backfill' : pour.type === 'Plinth' ? 'Concrete Plinth' : 'Structural Concrete';
  const mixInfo = [];
  if (pour.cy8000 > 0) mixInfo.push(`${pour.cy8000} CY 8000 PSI`);
  if (pour.cy5000 > 0) mixInfo.push(`${pour.cy5000} CY 5000 PSI`);
  if (pour.slurry > 0) mixInfo.push(`${pour.slurry} CY S80S662L2 8sk`);

  let html = '';

  // Pour selector + info card
  const allPours = getUpcomingPours();
  html += `<div class="mb-4 p-4 rounded-xl border" style="background:#0B0B0F;border-color:${secColor}33">
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-2 flex-wrap">
        ${allPours.map(p => {
          const pc = SEC_COLORS[p.section] || '#888';
          const active = p.id === pid;
          const pDone = CHECKLIST_ITEMS.reduce((s,g) => s + g.items.filter(it => checks[checkKey(p.id, it.what)]).length, 0);
          const pPct = Math.round(pDone / totalItems * 100);
          return `<button onclick="selectChecklistPour('${p.id}')" class="px-2 py-1 rounded text-[10px] mono font-bold transition-all ${active ? 'text-white' : 'text-white/30 hover:text-white/50'}" style="${active ? 'background:'+pc+'33;border:1px solid '+pc+'66' : 'border:1px solid transparent'}">${p.id} ${pPct>0&&pPct<100?'('+pPct+'%)':pPct===100?'✓':''}</button>`;
        }).join('')}
      </div>
    </div>
    <div class="flex items-start gap-3">
      <div class="w-10 h-10 rounded-lg flex items-center justify-center shrink-0 text-lg font-black" style="background:${secColor}22;color:${secColor}">${pour.section}</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-sm font-bold text-white">${pour.id} — ${typeDesc}</span>
          <span class="mono text-xs text-white/40">${pour.date}</span>
        </div>
        <div class="text-xs text-white/50">${mixInfo.join(' · ') || 'No quantities set'} · ${pour.total} CY total · ${pour.trucks} trucks</div>
        ${pour.dateObj ? `<div class="text-[10px] mono mt-1" style="color:${secColor}">${Math.ceil((pour.dateObj - new Date()) / 86400000)} days from today</div>` : ''}
      </div>
    </div>
  </div>`;

  // Progress bar
  html += `<div class="mb-5 p-3 rounded-xl border border-white/5" style="background:#0B0B0F">
    <div class="flex items-center justify-between mb-1.5">
      <span class="text-[10px] font-bold text-white/40 uppercase tracking-wider">${pour.id} Progress</span>
      <span class="mono text-xs font-bold" style="color:${pct===100?'#41A447':'#FFBF00'}">${doneCount}/${totalItems} — ${pct}%</span>
    </div>
    <div class="h-1.5 rounded-full bg-white/5 overflow-hidden">
      <div class="h-full rounded-full transition-all duration-500" style="width:${pct}%;background:${pct===100?'#41A447':pct>50?'#FFBF00':'#4AB8FF'}"></div>
    </div>
  </div>`;

  CHECKLIST_ITEMS.forEach(group => {
    const c = phaseColors[group.phase] || '#fff';
    const icon = phaseIcons[group.phase] || 'check_circle';
    const groupDone = group.items.filter(it => checks[checkKey(pid, it.what)]).length;

    html += `<div class="mb-4">
      <div class="flex items-center gap-2 mb-2 px-1">
        <span class="material-symbols-outlined text-sm" style="color:${c}">${icon}</span>
        <span class="text-[11px] font-black uppercase tracking-widest" style="color:${c}">${group.phase}</span>
        <span class="text-[10px] mono text-white/30 ml-auto">${groupDone}/${group.items.length}</span>
      </div>`;

    group.items.forEach(item => {
      const key = checkKey(pid, item.what);
      const done = !!checks[key];
      html += `<div onclick="toggleCheck('${key.replace(/'/g, "\\'")}')" class="flex items-start gap-3 p-3 rounded-lg mb-1 cursor-pointer transition-all ${done ? 'bg-white/[0.02]' : 'bg-white/[0.04] hover:bg-white/[0.06]'}" style="border-left:3px solid ${done ? c+'55' : c}">
        <div class="mt-0.5 w-5 h-5 rounded flex items-center justify-center shrink-0 transition-all" style="background:${done ? c : 'transparent'};border:2px solid ${done ? c : 'rgba(255,255,255,0.15)'}">
          ${done ? '<span class="material-symbols-outlined text-black" style="font-size:14px;font-variation-settings:\'FILL\' 1">check</span>' : ''}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="text-sm font-semibold ${done ? 'text-white/30 line-through' : 'text-white/90'}">${item.what}</span>
            <span class="text-[9px] mono font-bold px-1.5 py-0.5 rounded ${done ? 'text-white/15 bg-white/[0.02]' : 'text-white/40 bg-white/[0.06]'}">${item.who}</span>
          </div>
          <p class="text-[11px] ${done ? 'text-white/15' : 'text-white/35'} mt-0.5 leading-relaxed">${item.note}</p>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  el.innerHTML = html;
}

function switchTab(tab) {
  const dash = document.getElementById('dashboardView');
  const check = document.getElementById('checklistView');
  const footer = document.getElementById('footer');
  const tabD = document.getElementById('tabDash');
  const tabC = document.getElementById('tabCheck');
  if (tab === 'checklist') {
    dash.classList.add('hidden'); footer.classList.add('hidden');
    check.classList.remove('hidden');
    tabC.className = 'tab-btn px-3 py-1 rounded-full text-xs font-bold transition-all bg-white/10 text-white';
    tabD.className = 'tab-btn px-3 py-1 rounded-full text-xs font-bold transition-all text-white/40 hover:text-white/60';
    renderChecklist();
  } else {
    check.classList.add('hidden');
    dash.classList.remove('hidden'); footer.classList.remove('hidden');
    tabD.className = 'tab-btn px-3 py-1 rounded-full text-xs font-bold transition-all bg-white/10 text-white';
    tabC.className = 'tab-btn px-3 py-1 rounded-full text-xs font-bold transition-all text-white/40 hover:text-white/60';
  }
}

init();
setInterval(async () => {
  try {
    const { refs, pours, grand } = await fetchData();
    state.refs  = refs;
    state.pours = pours;
    state.grand = grand;
    render();
  } catch(e) { /* silent */ }
}, 30000);

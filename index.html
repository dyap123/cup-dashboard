<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CUP Pour Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "bg": "#06060A",
            "card": "#0B0B0F",
            "sa": "#4A8EFF",
            "sb": "#41A447",
            "sc": "#FFBF00",
            "sd": "#8B5CF6",
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    body { background:#06060A; color:#e4e1e8; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
    .mono { font-family:'JetBrains Mono',monospace; }
    .no-scroll::-webkit-scrollbar { display:none; }
    .no-scroll { -ms-overflow-style:none; scrollbar-width:none; }
    .dot-grid { background-image:radial-gradient(rgba(255,255,255,0.04) 1px,transparent 1px); background-size:20px 20px; }
    @keyframes pulse2 { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulse { animation:pulse2 1.8s ease-in-out infinite; }
    @keyframes barGrow { from{width:0} }
    .bar-animate { animation:barGrow .9s cubic-bezier(.65,0,.35,1) forwards; }
  </style>
</head>
<body class="min-h-screen">

<!-- HEADER -->
<header class="sticky top-0 z-50 border-b border-white/5" style="background:rgba(6,6,10,0.95);backdrop-filter:blur(20px)">
  <div class="max-w-7xl mx-auto px-4 h-14 flex items-center gap-4">
    <span class="font-black text-sm tracking-widest text-white/90 shrink-0">CUP POUR DASHBOARD</span>
    <div class="flex-1 flex justify-center gap-3 overflow-x-auto no-scroll">
      <div class="flex items-center gap-1.5 bg-white/5 rounded-full px-3 py-1 text-xs shrink-0">
        <span class="w-2 h-2 rounded-full bg-red-500 shrink-0"></span>
        <span class="mono text-white/70">O80D739K1</span>
        <span class="text-white/40">·</span>
        <span class="text-white/60">8000 PSI</span>
      </div>
      <div class="flex items-center gap-1.5 bg-white/5 rounded-full px-3 py-1 text-xs shrink-0">
        <span class="w-2 h-2 rounded-full bg-sa shrink-0"></span>
        <span class="mono text-white/70">O60C649J1</span>
        <span class="text-white/40">·</span>
        <span class="text-white/60">5000 PSI</span>
      </div>
    </div>
    <div class="flex items-center gap-3 shrink-0">
      <div class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-green-400 pulse"></span>
        <span class="text-xs text-white/50 font-medium">LIVE</span>
      </div>
      <a id="sheetLink" href="#" target="_blank" class="text-xs text-sa hover:text-white transition-colors">Open Sheet ↗</a>
    </div>
  </div>
</header>

<!-- FILTER BAR -->
<div class="sticky top-14 z-40 border-b border-white/5" style="background:rgba(6,6,10,0.92);backdrop-filter:blur(16px)">
  <div class="max-w-7xl mx-auto px-4 py-2 flex items-center gap-3 overflow-x-auto no-scroll">
    <div id="sectionFilters" class="flex gap-1.5 shrink-0">
      <button onclick="setSectionFilter('ALL')" data-sec="ALL" class="sec-pill px-3 py-1 rounded-full text-xs font-semibold transition-all active-pill">ALL</button>
      <button onclick="setSectionFilter('A')" data-sec="A" class="sec-pill px-3 py-1 rounded-full text-xs font-semibold transition-all" style="--sc:#4A8EFF">A</button>
      <button onclick="setSectionFilter('B')" data-sec="B" class="sec-pill px-3 py-1 rounded-full text-xs font-semibold transition-all" style="--sc:#41A447">B</button>
      <button onclick="setSectionFilter('C')" data-sec="C" class="sec-pill px-3 py-1 rounded-full text-xs font-semibold transition-all" style="--sc:#FFBF00">C</button>
      <button onclick="setSectionFilter('D')" data-sec="D" class="sec-pill px-3 py-1 rounded-full text-xs font-semibold transition-all" style="--sc:#8B5CF6">D</button>
    </div>
    <div class="w-px h-4 bg-white/10 shrink-0"></div>
    <div id="dateFilters" class="flex gap-1.5 overflow-x-auto no-scroll"></div>
  </div>
</div>

<!-- MAIN -->
<main class="max-w-7xl mx-auto px-4 py-5 space-y-5">

  <!-- LOADING -->
  <div id="loading" class="flex flex-col items-center justify-center py-20 gap-3">
    <div class="w-6 h-6 border-2 border-sa border-t-transparent rounded-full" style="animation:spin 1s linear infinite"></div>
    <p class="text-white/40 text-sm">Loading pour data…</p>
  </div>

  <!-- ZONE MAP -->
  <div id="zoneMap" class="hidden rounded-xl overflow-hidden border border-white/5 dot-grid" style="height:280px">
    <svg id="zoneSvg" viewBox="0 0 1000 280" preserveAspectRatio="none" class="w-full h-full" style="display:block"></svg>
  </div>

  <!-- SECTION SUMMARY -->
  <div id="sectionGrid" class="hidden grid grid-cols-2 md:grid-cols-4 gap-3"></div>

  <!-- POUR SCHEDULE -->
  <div id="pourGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>

  <!-- EMPTY STATE -->
  <div id="emptyState" class="hidden text-center py-12 text-white/30 text-sm">No pours match the current filter.</div>

</main>

<!-- GRAND TOTAL FOOTER -->
<div id="footer" class="hidden fixed bottom-0 left-0 right-0 z-50 border-t border-yellow-400/20" style="background:rgba(6,6,10,0.97);backdrop-filter:blur(20px)">
  <div class="max-w-7xl mx-auto px-4 h-12 flex items-center justify-between gap-4">
    <div class="flex items-center gap-6 overflow-x-auto no-scroll">
      <div class="flex items-center gap-2 shrink-0">
        <span class="w-2 h-2 rounded-full bg-red-400"></span>
        <span class="text-xs text-white/50">8000 Total</span>
        <span id="ftCy8000" class="mono text-sm font-bold text-red-300">—</span>
        <span class="text-xs text-white/30">CY</span>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <span class="w-2 h-2 rounded-full bg-sa"></span>
        <span class="text-xs text-white/50">5000 Total</span>
        <span id="ftCy5000" class="mono text-sm font-bold text-blue-300">—</span>
        <span class="text-xs text-white/30">CY</span>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <span class="text-xs text-white/50">Trucks</span>
        <span id="ftTrucks" class="mono text-sm font-bold text-white/80">—</span>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <span class="text-xs text-white/50">Grand Total</span>
        <span id="ftTotal" class="mono text-base font-bold text-yellow-300">—</span>
        <span class="text-xs text-white/30">CY</span>
      </div>
    </div>
    <a id="footerSheetLink" href="#" target="_blank" class="text-xs text-sa hover:text-white transition-colors shrink-0">Open Sheet ↗</a>
  </div>
</div>

<div class="h-16"></div><!-- footer spacer -->

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID = '1fTL_w-kLz0Jzwni9r3kSuGqSvlsFhNm0RsfRurQH750';
const GID      = '999';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit#gid=${GID}`;
const GViz_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

document.getElementById('sheetLink').href       = SHEET_URL;
document.getElementById('footerSheetLink').href = SHEET_URL;

const SEC_COLORS = { A:'#4A8EFF', B:'#41A447', C:'#FFBF00', D:'#8B5CF6' };
const SEC_DIM    = { A:'#1a2d4d', B:'#162a18', C:'#3a2d00', D:'#2a1a4d' };

// Editable pour labels (persisted in localStorage)
function getPourLabel(id) { return localStorage.getItem('cup_label_'+id) || ''; }
function setPourLabel(id, val) { localStorage.setItem('cup_label_'+id, val); }

// ── PARSER HELPERS ───────────────────────────────────────────────────────────
function anyNum(row, idx) {
  const c = row?.c?.[idx];
  if (!c || c.v == null) return 0;
  if (typeof c.v === 'number') return c.v;
  if (typeof c.v === 'string') { const n = parseFloat(c.v.replace(/,/g,'')); return isNaN(n) ? 0 : n; }
  return 0;
}
function anyStr(row, idx) {
  const c = row?.c?.[idx];
  if (!c || c.v == null) return '';
  return String(c.v);
}
function anyDate(row, idx) {
  const c = row?.c?.[idx];
  if (!c || c.v == null) return null;
  const v = String(c.v);
  if (v.startsWith('Date(')) {
    const p = v.match(/Date\((\d+),(\d+),(\d+)\)/);
    if (p && parseInt(p[1]) > 2000) return `${parseInt(p[2])+1}/${p[3]}`;
  }
  if (c.f) return c.f;
  return null;
}

// ── STATE ────────────────────────────────────────────────────────────────────
let state = { refs:{}, pours:[], grand:{}, sectionFilter:'ALL', dateFilter:'ALL' };

// ── FETCH & PARSE ────────────────────────────────────────────────────────────
async function fetchData() {
  const res  = await fetch(GViz_URL);
  const text = await res.text();
  const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!m) throw new Error('Invalid response from Google Sheets');
  const json = JSON.parse(m[1]);
  const rows = json.table.rows;

  const refs  = {};
  const pours = [];
  let grand   = {};
  let refDone = false, orderMode = false, skipNext = false;

  for (const row of rows) {
    if (!row?.c) continue;
    const col0 = anyStr(row, 0).trim();

    if (!refDone && ['A','B','C','D'].includes(col0) && Object.keys(refs).length < 4) {
      const cy8000    = anyNum(row, 1);
      const slurryVol = anyNum(row, 3);
      const plinthVol = anyNum(row, 5);
      const secTotal  = anyNum(row, 6);
      const cy5000    = Math.max(0, secTotal - cy8000 - slurryVol - plinthVol);
      refs[col0] = { cy8000, cy5000, slurryVol, plinthVol, secTotal };
      continue;
    }
    if (col0 === 'TOTAL')          { refDone = true; continue; }
    if (col0 === 'ORDER SUMMARY')  { orderMode = true; skipNext = true; continue; }
    if (skipNext)                  { skipNext = false; continue; }

    if (orderMode) {
      if (col0 === 'GRAND TOTAL') {
        grand = {
          cy8000:  anyNum(row, 3),
          cy5000:  anyNum(row, 4),
          total:   anyNum(row, 5),
          t8000:   anyNum(row, 6),
          t5000:   anyNum(row, 7),
          trucks:  anyNum(row, 8),
        };
        break;
      }
      if (/^[A-D]-[1-9]/.test(col0)) {
        pours.push({
          id:       col0,
          section:  anyStr(row, 1).trim() || col0[0],
          date:     anyDate(row, 2),
          cy8000:   anyNum(row, 3),
          cy5000:   anyNum(row, 4),
          total:    anyNum(row, 5),
          t8000:    anyNum(row, 6),
          t5000:    anyNum(row, 7),
          trucks:   anyNum(row, 8),
          status:   anyStr(row, 9).trim(),
        });
      }
    }
  }
  return { refs, pours, grand };
}

// ── FILTER LOGIC ─────────────────────────────────────────────────────────────
function filteredPours() {
  return state.pours.filter(p => {
    const secOk  = state.sectionFilter === 'ALL' || p.section === state.sectionFilter;
    const dateOk = state.dateFilter    === 'ALL' || p.date    === state.dateFilter;
    return secOk && dateOk;
  });
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const pours = filteredPours();
  const refs  = state.refs;

  renderZoneMap(pours);
  renderSectionCards(pours, refs);
  renderPourCards(pours);
  renderFooter();
  updateFilterPills();

  const hasContent = pours.length > 0;
  document.getElementById('emptyState').classList.toggle('hidden', hasContent || state.sectionFilter === 'ALL' && state.dateFilter === 'ALL');
  if (!hasContent && (state.sectionFilter !== 'ALL' || state.dateFilter !== 'ALL')) {
    document.getElementById('emptyState').classList.remove('hidden');
  }
}

// Zone Map — layout: C=left, B=upper-center, D=bottom-left, A=right (matches CUP site)
function renderZoneMap(pours) {
  const svg = document.getElementById('zoneSvg');
  // C=left, B=upper-center, A=right full height, D=bottom spanning under C+B
  const layout = [
    { s:'C', x:0,   y:0,   w:240, h:168 },
    { s:'B', x:244, y:0,   w:352, h:168 },
    { s:'A', x:600, y:0,   w:400, h:280 },
    { s:'D', x:0,   y:172, w:596, h:108 },
  ];
  const activeSec = state.sectionFilter;
  // Slurry hatching pattern
  let html = `<defs>
    <pattern id="slurryHatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>`;

  for (const z of layout) {
    const sec = z.s;
    const ref = state.refs[sec] || {};
    const active = activeSec === 'ALL' || activeSec === sec;
    const color = SEC_COLORS[sec];
    const dimFill = SEC_DIM[sec];
    const fill = active ? dimFill : '#0B0B0F';
    const stroke = active ? color : 'rgba(255,255,255,0.06)';
    const opacity = active ? 1 : 0.3;
    const secPours = pours.filter(p => p.section === sec);
    const slurryPour = secPours.find(p => p.id.endsWith('-1'));
    const structPour = secPours.find(p => !p.id.endsWith('-1') && !p.id.endsWith('-2') || p.id === 'D-3' || p.id === 'B-2' || p.id === 'C-2' || p.id === 'A-2');
    const cx = z.x + z.w/2;
    const cy = z.y + z.h/2;

    html += `<g style="cursor:pointer;opacity:${opacity}" onclick="setSectionFilter('${activeSec===sec?'ALL':sec}')">
      <rect x="${z.x+2}" y="${z.y+2}" width="${z.w-4}" height="${z.h-4}" rx="6" fill="${fill}" stroke="${stroke}" stroke-width="${active&&activeSec===sec?2.5:1}"/>`;
    // Slurry area indicator — hatched strip along bottom of zone
    if (ref.slurryVol) {
      const sh = Math.max(18, z.h * 0.2);
      html += `<rect x="${z.x+3}" y="${z.y+z.h-sh-2}" width="${z.w-6}" height="${sh}" rx="3" fill="url(#slurryHatch)" opacity="${active?0.8:0.3}"/>
        <text x="${z.x+z.w-10}" y="${z.y+z.h-sh+11}" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="8" fill="${color}" opacity="0.5">SLURRY ${ref.slurryVol} CY</text>`;
    }
    html += `<text x="${cx}" y="${cy-24}" text-anchor="middle" font-family="Inter,sans-serif" font-weight="900" font-size="${z.h>150?48:36}" fill="${color}" opacity="0.15">${sec}</text>
      <text x="${cx}" y="${cy}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-weight="700" font-size="${z.h>150?18:15}" fill="${color}">${ref.secTotal||'—'} CY</text>
      <text x="${cx}" y="${cy+16}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="rgba(255,255,255,0.5)">8000: ${ref.cy8000||0} · 5000: ${ref.cy5000||0}</text>`;
    // Pour dates
    const dates = secPours.map(p => p.date ? `${p.id}: ${p.date}` : '').filter(Boolean);
    if (dates.length) html += `<text x="${cx}" y="${cy+30}" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,0.25)">${dates.join(' · ')}</text>`;
    html += `</g>`;
  }
  svg.innerHTML = html;
}

// Section Summary Cards
function renderSectionCards(pours, refs) {
  const grid = document.getElementById('sectionGrid');
  const secs = state.sectionFilter === 'ALL' ? ['A','B','C','D'] : [state.sectionFilter];
  grid.innerHTML = secs.map(s => {
    const r = refs[s] || {};
    const c = SEC_COLORS[s];
    return `<div class="rounded-xl p-4 border border-white/5" style="background:#0B0B0F;border-left:3px solid ${c}">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-xs font-bold px-2 py-0.5 rounded" style="background:${c}22;color:${c}">SECTION ${s}</span>
      </div>
      <div class="mono text-2xl font-bold mb-3" style="color:${c}">${r.secTotal||'—'} <span class="text-sm text-white/40 font-normal">CY</span></div>
      <div class="space-y-1 text-xs">
        <div class="flex justify-between"><span class="text-white/50">8000 PSI</span><span class="mono font-semibold text-red-300">${r.cy8000||0} CY</span></div>
        <div class="flex justify-between"><span class="text-white/50">5000 PSI</span><span class="mono font-semibold text-blue-300">${r.cy5000||0} CY</span></div>
        ${r.slurryVol ? `<div class="flex justify-between"><span class="text-white/50">Slurry</span><span class="mono font-semibold text-white/60">${r.slurryVol} CY</span></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// Pour Cards
function renderPourCards(pours) {
  const grid = document.getElementById('pourGrid');
  if (!pours.length) { grid.innerHTML = ''; return; }

  const maxCy8000 = Math.max(...pours.map(p => p.cy8000), 1);
  const maxCy5000 = Math.max(...pours.map(p => p.cy5000), 1);

  grid.innerHTML = pours.map(p => {
    const c     = SEC_COLORS[p.section] || '#888';
    const pct8  = Math.round((p.cy8000 / maxCy8000) * 100);
    const pct5  = Math.round((p.cy5000 / maxCy5000) * 100);
    const stat  = p.status ? `<span class="text-xs px-2 py-0.5 rounded-full border" style="border-color:${c}44;color:${c}">${p.status}</span>` : '';
    return `<div class="rounded-xl p-4 border border-white/5" style="background:#0B0B0F">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="text-xs font-bold px-2 py-0.5 rounded" style="background:${c}22;color:${c}">${p.section}</span>
          <span class="mono font-bold text-sm text-white/90">${p.id}</span>
          <input type="text" class="bg-transparent border-b border-dashed border-white/15 text-xs text-white/60 w-24 px-1 py-0.5 focus:border-white/40 focus:outline-none placeholder:text-white/20 placeholder:italic" placeholder="+ label" value="${getPourLabel(p.id)}" onchange="setPourLabel('${p.id}',this.value)"/>
        </div>
        <div class="flex items-center gap-2">
          ${p.date ? `<span class="text-xs text-white/40">${p.date}</span>` : ''}
          ${stat}
        </div>
      </div>
      ${p.cy8000 > 0 ? `<div class="mb-2">
        <div class="flex justify-between text-xs mb-1"><span class="text-white/50">8000 PSI</span><span class="mono text-red-300 font-semibold">${p.cy8000} CY</span></div>
        <div class="h-1.5 rounded-full bg-white/5 overflow-hidden"><div class="h-full rounded-full bg-gradient-to-r from-red-600 to-orange-400 bar-animate" style="width:${pct8}%"></div></div>
      </div>` : ''}
      ${p.cy5000 > 0 ? `<div class="mb-3">
        <div class="flex justify-between text-xs mb-1"><span class="text-white/50">5000 PSI</span><span class="mono text-blue-300 font-semibold">${p.cy5000} CY</span></div>
        <div class="h-1.5 rounded-full bg-white/5 overflow-hidden"><div class="h-full rounded-full bg-gradient-to-r from-blue-600 to-cyan-400 bar-animate" style="width:${pct5}%"></div></div>
      </div>` : ''}
      <div class="flex items-center justify-between pt-2 border-t border-white/5">
        <span class="mono text-yellow-300 font-bold text-sm">${p.total} <span class="text-white/40 font-normal text-xs">CY</span></span>
        <span class="text-xs text-white/40">${p.trucks} trucks</span>
      </div>
    </div>`;
  }).join('');
}

// Footer
function renderFooter() {
  const g = state.grand;
  document.getElementById('ftCy8000').textContent = g.cy8000  ?? '—';
  document.getElementById('ftCy5000').textContent = g.cy5000  ?? '—';
  document.getElementById('ftTrucks').textContent = g.trucks  ?? '—';
  document.getElementById('ftTotal').textContent  = g.total   ?? '—';
}

// ── FILTER CONTROLS ───────────────────────────────────────────────────────────
function setSectionFilter(sec) {
  state.sectionFilter = sec;
  render();
}

function setDateFilter(date) {
  state.dateFilter = date;
  render();
}

function updateFilterPills() {
  // Section pills
  document.querySelectorAll('.sec-pill').forEach(btn => {
    const s   = btn.dataset.sec;
    const col = SEC_COLORS[s];
    const active = state.sectionFilter === s;
    if (active && s === 'ALL') {
      btn.style.cssText = 'background:rgba(255,255,255,0.12);color:white;border:1px solid rgba(255,255,255,0.2)';
    } else if (active && col) {
      btn.style.cssText = `background:${col}33;color:${col};border:1px solid ${col}66`;
    } else {
      btn.style.cssText = 'background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.06)';
    }
  });

  // Date pills
  const dates   = [...new Set(state.pours.map(p => p.date).filter(Boolean))].sort();
  const dateCnt = document.getElementById('dateFilters');
  dateCnt.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.textContent = 'ALL DATES';
  allBtn.onclick = () => setDateFilter('ALL');
  allBtn.className = 'px-3 py-1 rounded-full text-xs font-semibold transition-all shrink-0';
  allBtn.style.cssText = state.dateFilter === 'ALL'
    ? 'background:rgba(255,255,255,0.12);color:white;border:1px solid rgba(255,255,255,0.2)'
    : 'background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.06)';
  dateCnt.appendChild(allBtn);

  for (const d of dates) {
    const btn = document.createElement('button');
    btn.textContent = d;
    btn.onclick = () => setDateFilter(d);
    btn.className = 'px-3 py-1 rounded-full text-xs font-mono font-semibold transition-all shrink-0';
    btn.style.cssText = state.dateFilter === d
      ? 'background:rgba(255,215,0,0.18);color:#facc15;border:1px solid rgba(250,204,21,0.4)'
      : 'background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.06)';
    dateCnt.appendChild(btn);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const { refs, pours, grand } = await fetchData();
    state.refs  = refs;
    state.pours = pours;
    state.grand = grand;

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('zoneMap').classList.remove('hidden');
    document.getElementById('sectionGrid').classList.remove('hidden');
    document.getElementById('pourGrid').classList.remove('hidden');
    document.getElementById('footer').classList.remove('hidden');

    render();
  } catch (err) {
    console.error('Fetch error:', err);
    document.getElementById('loading').innerHTML =
      `<p class="text-red-400 text-sm">Error loading data. Check console.</p>`;
  }
}

// ── AUTO-REFRESH ──────────────────────────────────────────────────────────────
init();
setInterval(async () => {
  try {
    const { refs, pours, grand } = await fetchData();
    state.refs  = refs;
    state.pours = pours;
    state.grand = grand;
    render();
  } catch(e) { /* silent */ }
}, 30000);
</script>
